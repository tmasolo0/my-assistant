services:
  openclaw:
    image: my-assistant-openclaw:latest
    #build:
      #context: .
      #dockerfile: Dockerfile
    ports:
      - "18789:18789"
    env_file: .env
    environment:
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_CONFIG_DIR: /home/node/.openclaw/config
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
    volumes:
      - openclaw-config:/home/node/.openclaw/config
      - openclaw-workspace:/home/node/.openclaw/workspace
      - ./config:/home/node/.openclaw/config-src:ro
      - ./openclaw.json:/home/node/.openclaw/openclaw.json.src:ro
      - ./scripts:/home/node/.openclaw/scripts:ro
      - ./openclaw.json:/app/openclaw.json:ro
      - ./workspace:/app/workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - assistant
    restart: unless-stopped
    user: "0:0"
    command:
      - /bin/sh
      - -c
      - |
        cp -r /home/node/.openclaw/config-src/* /home/node/.openclaw/config/ 2>/dev/null || true
        cp /home/node/.openclaw/openclaw.json.src /home/node/.openclaw/openclaw.json 2>/dev/null || true
        cp /home/node/.openclaw/openclaw.json.src /home/node/.openclaw/config/openclaw.json 2>/dev/null || true
        apt-get update -qq && apt-get install -y -qq jq > /dev/null 2>&1 || true
        chown -R 1000:1000 /home/node/.openclaw
        export OPENCLAW_CONFIG_PATH=/home/node/.openclaw/openclaw.json
        su -s /bin/sh node -c 'export OPENCLAW_CONFIG_PATH=/home/node/.openclaw/openclaw.json && /home/node/.openclaw/scripts/expand-allowlist.sh && exec node /app/dist/index.js gateway --bind lan --port 18789'

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openclaw}
      POSTGRES_DB: ${POSTGRES_DB:-openclaw}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - assistant
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - assistant
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - assistant
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    profiles: ["n8n"]
    environment:
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-changeme}
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - assistant
    restart: unless-stopped

volumes:
  openclaw-config:
  openclaw-workspace:
  postgres-data:
  redis-data:
  ollama-data:
  n8n-data:

networks:
  assistant:
    driver: bridge
